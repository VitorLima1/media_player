workflows:
  ios-native-workflow:
    name: iOS Native Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Build iOS App (.app)
        script: |
          xcodebuild build \
            -project "MediaPlayerApp/MediaPlayerApp.xcodeproj" \
            -scheme "MediaPlayerApp" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/Build/Products/Release-iphoneos/*.app