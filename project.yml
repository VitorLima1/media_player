# XcodeGen spec generated for a repo that is maintained on Windows.
# Run `xcodegen generate --spec project.yml` from the repository root.
# It will create `MediaPlayerApp.xcodeproj` beside this file.

name: MediaPlayerApp

options:
  minimumXcodeGenVersion: "2.42.0"
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CLANG_ENABLE_MODULES: YES

targets:
  MediaPlayerApp:
    # XcodeGen maps `application` to com.apple.product-type.application.
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Keep these paths aligned with the folders committed from Windows.
    # The Info.plist is not listed as a source because Xcode reads it through
    # the INFOPLIST_FILE build setting below.
    sources:
      - path: MediaPlayerApp/App
      - path: MediaPlayerApp/Models
      - path: MediaPlayerApp/Services
      - path: MediaPlayerApp/ViewModels
      - path: MediaPlayerApp/Views
      - path: MediaPlayerApp/Utilities

    settings:
      base:
        PRODUCT_NAME: MediaPlayerApp
        PRODUCT_BUNDLE_IDENTIFIER: com.vitor.mediaplayerapp
        INFOPLIST_FILE: MediaPlayerApp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        VERSIONING_SYSTEM: apple-generic

schemes:
  MediaPlayerApp:
    build:
      targets:
        MediaPlayerApp: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

fileGroups:
  - README.md
  - codemagic.yaml
  - project.yml
  - MediaPlayerApp/Resources/Info.plist
